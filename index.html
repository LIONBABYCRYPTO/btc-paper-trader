<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>BTC Paper Trader — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',-apple-system,sans-serif; background:#0B1020; color:#e0e0e0; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px; }
.container { max-width:900px; width:100%; }
.header { text-align:center; margin-bottom:28px; }
.header h1 { font-size:22px; font-weight:700; color:#F7931A; letter-spacing:-0.3px; }
.header p { font-size:13px; color:#8899aa; margin-top:4px; }
.header .btc-icon { font-size:26px; margin-bottom:4px; }
.last-update { font-size:11px; color:#556; text-align:center; margin-bottom:20px; }
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px; }
.stat-card { background:#121A2F; border-radius:10px; padding:14px 12px; border:1px solid #1e2a45; text-align:center; }
.stat-card .label { font-size:10px; text-transform:uppercase; letter-spacing:0.8px; color:#778; margin-bottom:4px; }
.stat-card .value { font-size:20px; font-weight:700; }
.stat-card .value.green { color:#22c55e; }
.stat-card .value.red { color:#ef4444; }
.stat-card .value.gold { color:#FFD166; }
.stat-card .value.white { color:#f0f0f0; }
.stat-card .sub { font-size:10px; color:#667; margin-top:2px; }
.chart-container { background:#121A2F; border-radius:12px; border:1px solid #1e2a45; padding:18px; margin-bottom:20px; }
.chart-container h3 { font-size:13px; color:#8899aa; margin-bottom:12px; font-weight:600; }
.chart-wrap { position:relative; height:280px; }
.position-box { background:#121A2F; border-radius:12px; border:1px solid #1e2a45; padding:18px; margin-bottom:20px; }
.position-box h3 { font-size:13px; color:#8899aa; margin-bottom:10px; font-weight:600; }
.position-box .row { display:flex; justify-content:space-between; padding:6px 0; font-size:14px; border-bottom:1px solid #1a2540; }
.position-box .row:last-child { border-bottom:0; }
.position-box .row .label { color:#8899aa; }
.position-box .row .value { font-weight:600; }
.in-position { border-left:3px solid #22c55e; }
.not-position { border-left:3px solid #667; }
.trades { background:#121A2F; border-radius:12px; border:1px solid #1e2a45; overflow:hidden; margin-bottom:20px; }
.trades h3 { font-size:13px; color:#8899aa; padding:16px 18px 10px; font-weight:600; }
.trades table { width:100%; border-collapse:collapse; font-size:12px; }
.trades th { text-align:left; padding:8px 12px; font-size:10px; text-transform:uppercase; letter-spacing:0.6px; color:#667; border-bottom:1px solid #1e2a45; }
.trades td { padding:10px 12px; border-bottom:1px solid #1a2540; white-space:nowrap; }
.trades tr:last-child td { border-bottom:0; }
.trades .buy { color:#22c55e; font-weight:600; }
.trades .sell { color:#ef4444; font-weight:600; }
.trades .pnl-pos { color:#22c55e; }
.trades .pnl-neg { color:#ef4444; }
.trades .reason { color:#778; font-size:11px; }
.no-trades { text-align:center; padding:32px; color:#556; }
.export-bar { display:flex; gap:10px; justify-content:center; margin-top:8px; }
.export-btn { background:#1e2a45; border:1px solid #2a3a5a; border-radius:8px; padding:8px 18px; color:#8899aa; font-size:12px; cursor:pointer; font-family:inherit; transition:all .2s; }
.export-btn:hover { background:#2a3a5a; color:#e0e0e0; }
.refresh-bar { text-align:center; margin-bottom:20px; }
.refresh-btn { background:#F7931A; border:none; border-radius:8px; padding:10px 28px; color:#0B1020; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; transition:opacity .2s; }
.refresh-btn:hover { opacity:.85; }
.refresh-btn:disabled { opacity:.4; cursor:not-allowed; }
@media (max-width:600px) { .stats { grid-template-columns:repeat(2,1fr); } .trades table { font-size:11px; } .trades td,.trades th { padding:6px 8px; } .container { padding:0; } }
.splash { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center; }
.splash h2 { font-size:18px; color:#8899aa; margin-top:16px; font-weight:500; }
.splash p { color:#556; font-size:13px; margin-top:6px; }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="header">
    <div class="btc-icon">₿</div>
    <h1>BTC Paper Trader</h1>
    <p>EMA(9/21/55) + ADX + ATR Trailing Stop · Daily</p>
  </div>
  <div class="refresh-bar">
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">⟳ Refresh</button>
  </div>
  <div id="content">
    <div class="splash"><h2>Loading dashboard...</h2><p>Fetching trade data</p></div>
  </div>
</div>

<script>
// ─── DATA — injected at build time by generate_dashboard.py ────
const INLINE_TRADES = [{"timestamp": "2026-06-14T05:29:15.496249+00:00", "type": "BUY", "price": 64300.01, "size_btc": 0.147745, "capital_after": 10000.0, "pnl": 0.0, "reason": "FORCED ENTRY - kickstart paper trading", "source": "binance_spot"}, {"timestamp": "2026-06-14T05:29:15.496595+00:00", "type": "SELL", "price": 64450.01, "size_btc": 0.147745, "capital_after": 10012.64, "pnl": 12.64, "reason": "FORCED EXIT - kickstart paper trading", "source": "binance_spot"}, {"timestamp": "2026-06-14T05:29:32.074377+00:00", "type": "BUY", "price": 64298.01, "size_btc": 0.14775, "capital_after": 10000.0, "pnl": 0.0, "reason": "FORCED ENTRY - kickstart paper trading", "source": "binance_spot"}, {"timestamp": "2026-06-14T05:29:32.074632+00:00", "type": "SELL", "price": 64448.01, "size_btc": 0.14775, "capital_after": 10012.64, "pnl": 12.64, "reason": "FORCED EXIT - kickstart paper trading", "source": "binance_spot"}];
const INLINE_STATE = {"capital": 10012.640265305256, "position": 0.0, "entry_price": 0.0, "trail_stop": 0.0, "in_position": false, "trade_count": 1, "last_checked": "2026-06-27T01:01:01.471533+00:00"};

// ─── RENDERING ──────────────────────────────────────────────────
let equityChart = null;
let tradeData = INLINE_TRADES;
let stateData = INLINE_STATE;

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).map(line => {
    const vals = line.split(',').map(v => v.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] || '');
    return obj;
  }).filter(r => r.timestamp);
}

function computeEquityCurve(trades, initialCapital) {
  const curve = [];
  let cash = initialCapital;
  let btc = 0;
  curve.push({ date: trades[0]?.timestamp?.split('T')[0] || 'start', equity: initialCapital, label: 'Start' });
  for (const t of trades) {
    const price = parseFloat(t.price);
    const size = parseFloat(t.size_btc);
    const date = t.timestamp.split('T')[0];
    if (t.type === 'BUY') { cash -= size * price; btc += size; }
    else if (t.type === 'SELL') { cash += size * price; btc = 0; }
    curve.push({ date, equity: Math.round((cash + (btc * price)) * 100) / 100, label: t.type === 'BUY' ? 'Buy' : (t.type === 'SELL' ? 'Sell' : '') });
  }
  return curve;
}

function computeStats(trades, currentEquity, initialCapital) {
  if (!trades.length) return { trades:0, winRate:0, profitFactor:0, totalReturn:0, totalReturnPct:0, avgWin:0, avgLoss:0, maxDrawdown:0 };
  let wins=0, losses=0, totalWin=0, totalLoss=0, peak=initialCapital, maxDD=0;
  const curve = computeEquityCurve(trades, initialCapital);
  for (const pt of curve) { if (pt.equity > peak) peak = pt.equity; const dd = (peak - pt.equity) / peak * 100; if (dd > maxDD) maxDD = dd; }
  for (const t of trades) { if (t.type === 'SELL' && t.pnl) { const p = parseFloat(t.pnl); if (p >= 0) { wins++; totalWin += p; } else { losses++; totalLoss += Math.abs(p); } } }
  const total = wins + losses;
  return { trades:total, winRate:total>0 ? (wins/total*100) : 0, profitFactor:totalLoss>0 ? totalWin/totalLoss : (totalWin>0?Infinity:0), avgWin:wins>0 ? totalWin/wins : 0, avgLoss:losses>0 ? totalLoss/losses : 0, totalReturnPct:((currentEquity-initialCapital)/initialCapital*100), totalReturn:currentEquity - initialCapital, maxDrawdown:maxDD, wins, losses };
}

function renderDashboard(state, trades) {
  const initialCapital = 10000;
  const price = state.current_price || 64358;
  const capital = state.capital || initialCapital;
  const pos = state.position || 0;
  const inPos = state.in_position === true;
  const equity = capital + (pos * price);
  const stats = computeStats(trades, equity, initialCapital);
  const curve = computeEquityCurve(trades, initialCapital);

  const perfClass = equity >= initialCapital ? 'green' : 'red';
  const perfSign = equity >= initialCapital ? '+' : '';
  const perfAmt = equity - initialCapital;
  const perfPct = ((equity - initialCapital) / initialCapital * 100);

  const html = `
    <div class="stats">
      <div class="stat-card">
        <div class="label">Portfolio</div>
        <div class="value ${perfClass}">$${Math.round(equity).toLocaleString()}</div>
        <div class="sub">${perfSign}$${Math.round(perfAmt).toLocaleString()} (${perfPct >= 0 ? '+' : ''}${perfPct.toFixed(1)}%)</div>
      </div>
      <div class="stat-card">
        <div class="label">BTC Price</div>
        <div class="value gold">$${Math.round(price).toLocaleString()}</div>
        <div class="sub">${pos.toFixed(6)} BTC</div>
      </div>
      <div class="stat-card">
        <div class="label">Trades</div>
        <div class="value white">${stats.trades}</div>
        <div class="sub">${stats.winRate.toFixed(0)}% win · Pf ${stats.profitFactor === Infinity ? '∞' : stats.profitFactor.toFixed(2)}</div>
      </div>
      <div class="stat-card">
        <div class="label">Max DD</div>
        <div class="value red">${stats.maxDrawdown.toFixed(1)}%</div>
        <div class="sub">Avg Win ${stats.avgWin > 0 ? '+' : ''}$${Math.round(stats.avgWin).toLocaleString()}</div>
      </div>
    </div>

    <div class="chart-container">
      <h3>Portfolio Equity Curve</h3>
      <div class="chart-wrap"><canvas id="equityChartEl"></canvas></div>
    </div>

    <div class="position-box ${inPos ? 'in-position' : 'not-position'}">
      <h3>${inPos ? '🟢 In Position' : '⚪ No Position'}</h3>
      ${inPos ? `
        <div class="row"><span class="label">Entry Price</span><span class="value">$${parseFloat(state.entry_price||0).toLocaleString(undefined,{maximumFractionDigits:0})}</span></div>
        <div class="row"><span class="label">Position</span><span class="value">${(state.position||0).toFixed(6)} BTC</span></div>
        <div class="row"><span class="label">Trail Stop</span><span class="value">$${parseFloat(state.trail_stop||0).toLocaleString(undefined,{maximumFractionDigits:0})}</span></div>
        <div class="row"><span class="label">Unrealized</span><span class="value">${(pos*price-pos*parseFloat(state.entry_price||0)) >= 0 ? '+' : ''}$${((pos*price-pos*parseFloat(state.entry_price||0))).toLocaleString(undefined,{maximumFractionDigits:0})}</span></div>
      ` : `
        <div class="row"><span class="label">Cash</span><span class="value">$${Math.round(capital).toLocaleString()}</span></div>
        <div class="row"><span class="label">Waiting for signal</span><span class="value" style="color:#667">—</span></div>
      `}
    </div>

    <div class="trades">
      <h3>Trade History (${trades.length})</h3>
      ${trades.length === 0 ? '<div class="no-trades">No trades yet</div>' : `
      <div style="overflow-x:auto">
      <table>
        <thead><tr><th>Date</th><th>Type</th><th>Price</th><th>Size</th><th>PnL</th><th>Capital</th><th>Reason</th></tr></thead>
        <tbody>
          ${trades.slice().reverse().map(t => {
            const pnl = t.pnl !== undefined && t.pnl !== null ? t.pnl : null;
            const cap = t.capital_after || null;
            return `<tr>
              <td style="font-size:10px;color:#667">${t.timestamp?.split('T')[0]}</td>
              <td class="${t.type === 'BUY' ? 'buy' : 'sell'}">${t.type}</td>
              <td>$${Math.round(t.price).toLocaleString()}</td>
              <td>${t.size_btc.toFixed(6)}</td>
              <td class="${pnl !== null ? (pnl >= 0 ? 'pnl-pos' : 'pnl-neg') : ''}">${pnl !== null ? (pnl >= 0 ? '+' : '') + '$' + Math.round(pnl).toLocaleString() : '—'}</td>
              <td>${cap ? '$' + Math.round(cap).toLocaleString() : '—'}</td>
              <td class="reason">${t.reason || ''}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      </div>`}
    </div>

    <div class="export-bar">
      <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
      <button class="export-btn" onclick="exportJSON()">⬇ Export JSON</button>
    </div>
    <div class="last-update" id="updateTs"></div>
  `;

  document.getElementById('content').innerHTML = html;

  // Chart
  const labels = curve.map(p => p.date);
  const values = curve.map(p => p.equity);
  const markerPoints = curve.filter(p => p.label).map(p => ({x: p.date, y: p.equity, label: p.label}));
  if (equityChart) equityChart.destroy();
  const ctx = document.getElementById('equityChartEl');
  if (!ctx) return;
  equityChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Portfolio Value',
        data: values,
        borderColor: '#F7931A',
        backgroundColor: (ctx) => { const g = ctx.chart.ctx.createLinearGradient(0,0,0,280); g.addColorStop(0,'rgba(247,147,26,0.15)'); g.addColorStop(1,'rgba(247,147,26,0)'); return g; },
        fill: true,
        borderWidth: 2,
        pointRadius: (ctx) => markerPoints.find(m => m.x === labels[ctx.dataIndex]) ? 6 : 0,
        pointBackgroundColor: (ctx) => { const pt = markerPoints.find(m => m.x === labels[ctx.dataIndex]); return pt ? (pt.label === 'Buy' ? '#22c55e' : '#ef4444') : 'transparent'; },
        pointStyle: (ctx) => { const pt = markerPoints.find(m => m.x === labels[ctx.dataIndex]); return pt ? (pt.label === 'Buy' ? 'triangle' : 'rectRot') : 'circle'; },
        tension: 0.3
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: (ctx) => { const pt = markerPoints.find(m => m.x === ctx.label); const v = '$'+Math.round(parseFloat(ctx.raw)).toLocaleString(); return pt ? pt.label+': '+v : v; } } }
      },
      scales: {
        x: { ticks: { color:'#556', maxTicksLimit:10, font:{size:10} }, grid: { color:'#1a2540' } },
        y: { ticks: { color:'#556', font:{size:10}, callback: v => '$'+Math.round(v).toLocaleString() }, grid: { color:'#1a2540' } }
      }
    }
  });
}

function exportCSV() {
  if (!tradeData.length) return;
  const headers = Object.keys(tradeData[0]).join(',');
  const rows = tradeData.map(t => Object.values(t).map(v => `"${v}"`).join(','));
  const blob = new Blob([headers + '\n' + rows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'btc_trades.csv'; a.click();
}
function exportJSON() {
  const blob = new Blob([JSON.stringify({state: stateData, trades: tradeData}, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'btc_trader_data.json'; a.click();
}
async function loadData() {
  document.getElementById('refreshBtn').disabled = true;
  document.getElementById('refreshBtn').textContent = '⟳ Loading...';
  try {
    const p = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
    if (p.ok) {
      const d = await p.json();
      INLINE_STATE.current_price = parseFloat(d.price);
    }
  } catch(e) {}
  renderDashboard(INLINE_STATE, INLINE_TRADES);
  document.getElementById('updateTs').textContent = `Last updated: ${new Date().toLocaleString('en-SG', {timeZone: 'Asia/Singapore'})} SGT`;
  document.getElementById('refreshBtn').disabled = false;
  document.getElementById('refreshBtn').textContent = '⟳ Refresh';
}

document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
