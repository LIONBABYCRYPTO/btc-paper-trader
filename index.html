<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>BTC Paper Trader — Dashboard</title>
<!-- Chart.js for live charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0B1020;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}
.container { max-width: 900px; width: 100%; }

/* Header */
.header { text-align: center; margin-bottom: 28px; }
.header h1 { font-size: 22px; font-weight: 700; color: #F7931A; letter-spacing: -0.3px; }
.header p { font-size: 13px; color: #8899aa; margin-top: 4px; }
.header .btc-icon { display: inline-block; font-size: 26px; margin-bottom: 4px; }
.last-update { font-size: 11px; color: #556; text-align: center; margin-bottom: 20px; }

/* Stat Cards */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
.stat-card {
  background: #121A2F; border-radius: 10px; padding: 14px 12px;
  border: 1px solid #1e2a45; text-align: center;
}
.stat-card .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: #778; margin-bottom: 4px; }
.stat-card .value { font-size: 20px; font-weight: 700; }
.stat-card .value.green { color: #22c55e; }
.stat-card .value.red { color: #ef4444; }
.stat-card .value.gold { color: #FFD166; }
.stat-card .value.white { color: #f0f0f0; }
.stat-card .sub { font-size: 10px; color: #667; margin-top: 2px; }

/* Chart */
.chart-container { background: #121A2F; border-radius: 12px; border: 1px solid #1e2a45; padding: 18px; margin-bottom: 20px; }
.chart-container h3 { font-size: 13px; color: #8899aa; margin-bottom: 12px; font-weight: 600; }
.chart-wrap { position: relative; height: 280px; }

/* Position Box */
.position-box {
  background: #121A2F; border-radius: 12px; border: 1px solid #1e2a45;
  padding: 18px; margin-bottom: 20px;
}
.position-box h3 { font-size: 13px; color: #8899aa; margin-bottom: 10px; font-weight: 600; }
.position-box .row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; border-bottom: 1px solid #1a2540; }
.position-box .row:last-child { border-bottom: 0; }
.position-box .row .label { color: #8899aa; }
.position-box .row .value { font-weight: 600; }
.in-position { border-left: 3px solid #22c55e; }
.not-position { border-left: 3px solid #667; }

/* Trade Table */
.trades { background: #121A2F; border-radius: 12px; border: 1px solid #1e2a45; overflow: hidden; margin-bottom: 20px; }
.trades h3 { font-size: 13px; color: #8899aa; padding: 16px 18px 10px; font-weight: 600; }
.trades table { width: 100%; border-collapse: collapse; font-size: 12px; }
.trades th { text-align: left; padding: 8px 12px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: #667; border-bottom: 1px solid #1e2a45; }
.trades td { padding: 10px 12px; border-bottom: 1px solid #1a2540; white-space: nowrap; }
.trades tr:last-child td { border-bottom: 0; }
.trades .buy { color: #22c55e; font-weight: 600; }
.trades .sell { color: #ef4444; font-weight: 600; }
.trades .pnl-pos { color: #22c55e; }
.trades .pnl-neg { color: #ef4444; }
.trades .reason { color: #778; font-size: 11px; }
.no-trades { text-align: center; padding: 32px; color: #556; }
.ta-center { text-align: center; }

/* Export */
.export-bar { display: flex; gap: 10px; justify-content: center; margin-top: 8px; }
.export-btn {
  background: #1e2a45; border: 1px solid #2a3a5a; border-radius: 8px;
  padding: 8px 18px; color: #8899aa; font-size: 12px; cursor: pointer;
  font-family: inherit; transition: all 0.2s;
}
.export-btn:hover { background: #2a3a5a; color: #e0e0e0; }

/* Refresh */
.refresh-bar { text-align: center; margin-bottom: 20px; }
.refresh-btn {
  background: #F7931A; border: none; border-radius: 8px;
  padding: 10px 28px; color: #0B1020; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: opacity 0.2s;
}
.refresh-btn:hover { opacity: 0.85; }
.refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Responsive */
@media (max-width: 600px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .trades table { font-size: 11px; }
  .trades td, .trades th { padding: 6px 8px; }
  .container { padding: 0; }
}

/* Splash */
.splash { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; }
.splash h2 { font-size: 18px; color: #8899aa; margin-top: 16px; font-weight: 500; }
.splash p { color: #556; font-size: 13px; margin-top: 6px; }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="header">
    <div class="btc-icon">₿</div>
    <h1>BTC Paper Trader</h1>
    <p>EMA(9/21/55) + ADX + ATR Trailing Stop · Daily</p>
  </div>
  <div class="refresh-bar">
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">⟳ Refresh Data</button>
  </div>
  <div id="content">
    <div class="splash">
      <h2>Loading dashboard...</h2>
      <p>Fetching trade data from GitHub</p>
    </div>
  </div>
</div>

<script>
// ─── Data Sources ────────────────────────────────────────────────
const GITHUB_OWNER = 'LIONBABYCRYPTO';
const GITHUB_REPO = 'worldcup-2026-bracket';
const TRADES_PATH = 'btc_trades.csv';
const STATE_PATH = 'btc_state.json';

let equityChart = null;
let tradeData = [];
let stateData = null;

// ─── CSV Parser ──────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).map(line => {
    const vals = line.split(',').map(v => v.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] || '');
    return obj;
  }).filter(r => r.timestamp);
}

// ─── Compute Equity Curve ────────────────────────────────────────
function computeEquityCurve(trades, initialCapital) {
  const curve = [];
  let cash = initialCapital;
  let btc = 0;
  let entryPrice = 0;

  curve.push({ date: trades[0]?.timestamp?.split('T')[0] || 'start', equity: initialCapital, label: 'Start' });

  for (const t of trades) {
    const price = parseFloat(t.price);
    const size = parseFloat(t.size_btc);
    const date = t.timestamp.split('T')[0];

    if (t.type === 'BUY') {
      const cost = size * price;
      cash -= cost;
      btc += size;
      entryPrice = price;
    } else if (t.type === 'SELL') {
      const value = size * price;
      cash += value;
      btc = 0;
      entryPrice = 0;
    }
    const equity = cash + (btc * price);
    const label = t.type === 'BUY' ? 'Buy' : (t.type === 'SELL' ? 'Sell' : '');
    curve.push({ date, equity: Math.round(equity * 100) / 100, label, isTrade: true });
  }

  // Final point at current price if in position
  return curve;
}

// ─── Compute Stats ───────────────────────────────────────────────
function computeStats(trades, currentEquity, initialCapital) {
  if (trades.length === 0) {
    return { trades: 0, winRate: 0, profitFactor: 0, totalReturn: 0, totalReturnPct: 0, avgWin: 0, avgLoss: 0, maxDrawdown: 0 };
  }
  const buyAndHoldReturn = initialCapital ? ((currentEquity - initialCapital) / initialCapital * 100) : 0;

  let wins = 0, losses = 0;
  let totalWin = 0, totalLoss = 0;
  let peak = initialCapital;
  let maxDD = 0;

  const curve = computeEquityCurve(trades, initialCapital);
  for (const pt of curve) {
    if (pt.equity > peak) peak = pt.equity;
    const dd = (peak - pt.equity) / peak * 100;
    if (dd > maxDD) maxDD = dd;
  }

  for (const t of trades) {
    if (t.type === 'SELL' && t.pnl) {
      const pnl = parseFloat(t.pnl);
      if (pnl >= 0) { wins++; totalWin += pnl; }
      else { losses++; totalLoss += Math.abs(pnl); }
    }
  }

  const totalTrades = wins + losses;
  return {
    trades: totalTrades,
    winRate: totalTrades > 0 ? (wins / totalTrades * 100) : 0,
    profitFactor: totalLoss > 0 ? (totalWin / totalLoss) : (totalWin > 0 ? Infinity : 0),
    avgWin: wins > 0 ? (totalWin / wins) : 0,
    avgLoss: losses > 0 ? (totalLoss / losses) : 0,
    totalReturnPct: buyAndHoldReturn,
    totalReturn: currentEquity - initialCapital,
    maxDrawdown: maxDD,
    wins,
    losses
  };
}

// ─── Render ──────────────────────────────────────────────────────
function renderDashboard(state, trades) {
  const initialCapital = 10000;
  const currentPrice = parseFloat(state?.current_price || 64358);
  const capital = parseFloat(state?.capital || initialCapital);
  const position = parseFloat(state?.position || 0);
  const inPosition = state?.in_position === true;
  const equity = capital + (position * currentPrice);
  const totalReturn = equity - initialCapital;
  const totalReturnPct = (totalReturn / initialCapital) * 100;

  // Compute equity curve
  const curve = computeEquityCurve(trades, initialCapital);
  if (curve.length === 0) return;

  // Stats
  const stats = computeStats(trades, equity, initialCapital);

  // ─── Stats Cards ───────────────────────────────────────
  const numTrades = trades.filter(t => t.type === 'SELL').length || stats.trades;
  document.getElementById('content').innerHTML = `
    <div class="stats">
      <div class="stat-card">
        <div class="label">Portfolio</div>
        <div class="value ${totalReturn >= 0 ? 'green' : 'red'}">$${equity.toLocaleString(undefined, {maximumFractionDigits: 0})}</div>
        <div class="sub">${totalReturn >= 0 ? '+' : ''}$${totalReturn.toLocaleString(undefined, {maximumFractionDigits: 0})} (${totalReturnPct >= 0 ? '+' : ''}${totalReturnPct.toFixed(1)}%)</div>
      </div>
      <div class="stat-card">
        <div class="label">BTC Price</div>
        <div class="value gold">$${currentPrice.toLocaleString(undefined, {maximumFractionDigits: 0})}</div>
        <div class="sub">${state?.position_btc ? parseFloat(state.position_btc).toFixed(6) : '0.000000'} BTC</div>
      </div>
      <div class="stat-card">
        <div class="label">Trades</div>
        <div class="value white">${numTrades}</div>
        <div class="sub">${stats.winRate.toFixed(0)}% win · Pf ${stats.profitFactor === Infinity ? '∞' : stats.profitFactor.toFixed(2)}</div>
      </div>
      <div class="stat-card">
        <div class="label">Max DD</div>
        <div class="value red">${stats.maxDrawdown.toFixed(1)}%</div>
        <div class="sub">Avg Win ${stats.avgWin > 0 ? '+' : ''}$${stats.avgWin.toFixed(0)}</div>
      </div>
    </div>

    <div class="chart-container">
      <h3>Portfolio Equity Curve</h3>
      <div class="chart-wrap">
        <canvas id="equityChart"></canvas>
      </div>
    </div>

    <div class="position-box ${inPosition ? 'in-position' : 'not-position'}">
      <h3>${inPosition ? '🟢 In Position' : '⚪ No Position'}</h3>
      ${inPosition ? `
        <div class="row"><span class="label">Entry Price</span><span class="value">$${parseFloat(state.entry_price || 0).toLocaleString(undefined, {maximumFractionDigits: 2})}</span></div>
        <div class="row"><span class="label">Position Size</span><span class="value">${(state.position_btc || position).toFixed(6)} BTC</span></div>
        <div class="row"><span class="label">Trail Stop</span><span class="value">$${parseFloat(state.trail_stop || 0).toLocaleString(undefined, {maximumFractionDigits: 0})}</span></div>
        <div class="row"><span class="label">Unrealized PnL</span><span class="value ${(position * currentPrice) - (position * parseFloat(state.entry_price || 0)) >= 0 ? 'green' : 'red'}">${((position * currentPrice) - (position * parseFloat(state.entry_price || 0))) >= 0 ? '+' : ''}$${((position * currentPrice) - (position * parseFloat(state.entry_price || 0))).toLocaleString(undefined, {maximumFractionDigits: 0})}</span></div>
      ` : `
        <div class="row"><span class="label">Cash</span><span class="value">$${capital.toLocaleString(undefined, {maximumFractionDigits: 0})}</span></div>
        <div class="row"><span class="label">Waiting for signal</span><span class="value" style="color:#667">—</span></div>
      `}
    </div>

    <div class="trades">
      <h3>Trade History (${trades.length})</h3>
      ${trades.length === 0 ? '<div class="no-trades">No trades yet</div>' : `
      <div style="overflow-x:auto">
      <table>
        <thead><tr><th>Date</th><th>Type</th><th>Price</th><th>Size</th><th>PnL</th><th>Capital</th><th>Reason</th></tr></thead>
        <tbody>
          ${trades.slice().reverse().map(t => {
            const pnl = t.pnl !== '' ? parseFloat(t.pnl) : null;
            const cap = t.capital_after !== '' ? parseFloat(t.capital_after) : null;
            return `<tr>
              <td style="font-size:10px;color:#667">${t.timestamp?.split('T')[0]}</td>
              <td class="${t.type === 'BUY' ? 'buy' : 'sell'}">${t.type}</td>
              <td>$${parseFloat(t.price).toLocaleString(undefined, {maximumFractionDigits: 0})}</td>
              <td>${parseFloat(t.size_btc).toFixed(6)}</td>
              <td class="${pnl !== null ? (pnl >= 0 ? 'pnl-pos' : 'pnl-neg') : ''}">${pnl !== null ? (pnl >= 0 ? '+' : '') + '$' + pnl.toLocaleString(undefined, {maximumFractionDigits: 0}) : '—'}</td>
              <td>${cap ? '$' + cap.toLocaleString(undefined, {maximumFractionDigits: 0}) : '—'}</td>
              <td class="reason">${t.reason || ''}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      </div>`}
    </div>

    <div class="export-bar">
      <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
      <button class="export-btn" onclick="exportJSON()">⬇ Export JSON</button>
    </div>
    <div class="last-update" id="updateTs">Last updated: loading...</div>
  `;

  // ─── Equity Chart ────────────────────────────────────────
  const ctx = document.getElementById('equityChart').getContext('2d');

  const labels = curve.map(p => p.date);
  const values = curve.map(p => p.equity);
  const markerPoints = curve.filter(p => p.label).map(p => ({x: p.date, y: p.equity, label: p.label}));

  if (equityChart) equityChart.destroy();

  equityChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Portfolio Value',
        data: values,
        borderColor: '#F7931A',
        backgroundColor: (ctx) => {
          const g = ctx.chart.ctx.createLinearGradient(0, 0, 0, 280);
          g.addColorStop(0, 'rgba(247,147,26,0.15)');
          g.addColorStop(1, 'rgba(247,147,26,0)');
          return g;
        },
        fill: true,
        borderWidth: 2,
        pointRadius: (ctx) => {
          const pt = markerPoints.find(m => m.x === labels[ctx.dataIndex]);
          return pt ? 6 : 0;
        },
        pointBackgroundColor: (ctx) => {
          const pt = markerPoints.find(m => m.x === labels[ctx.dataIndex]);
          if (!pt) return 'transparent';
          return pt.label === 'Buy' ? '#22c55e' : '#ef4444';
        },
        pointBorderColor: (ctx) => {
          const pt = markerPoints.find(m => m.x === labels[ctx.dataIndex]);
          if (!pt) return 'transparent';
          return pt.label === 'Buy' ? '#22c55e' : '#ef4444';
        },
        pointStyle: (ctx) => {
          const pt = markerPoints.find(m => m.x === labels[ctx.dataIndex]);
          if (!pt) return 'circle';
          return pt.label === 'Buy' ? 'triangle' : 'rectRot';
        },
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (ctx) => {
              const pt = markerPoints.find(m => m.x === ctx.label);
              const val = `$${parseFloat(ctx.raw).toLocaleString(undefined, {maximumFractionDigits: 0})}`;
              return pt ? `${pt.label}: ${val}` : val;
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#556', maxTicksLimit: 10, font: {size: 10} },
          grid: { color: '#1a2540' }
        },
        y: {
          ticks: { color: '#556', font: {size: 10}, callback: v => '$' + v.toLocaleString() },
          grid: { color: '#1a2540' }
        }
      }
    }
  });

  document.getElementById('updateTs').textContent = `Last updated: ${new Date().toLocaleString('en-SG', {timeZone: 'Asia/Singapore'})} SGT`;
}

// ─── Export ──────────────────────────────────────────────────────
function exportCSV() {
  if (tradeData.length === 0) return;
  const headers = Object.keys(tradeData[0]).join(',');
  const rows = tradeData.map(t => Object.values(t).map(v => `"${v}"`).join(','));
  const blob = new Blob([headers + '\n' + rows.join('\n')], {type: 'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'btc_trades.csv'; a.click();
  URL.revokeObjectURL(url);
}

function exportJSON() {
  const data = { state: stateData, trades: tradeData };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'btc_trader_data.json'; a.click();
  URL.revokeObjectURL(url);
}

// ─── Load Data ───────────────────────────────────────────────────
async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '⟳ Loading...';

  // Fetch from Cloudflare Worker proxy
  const WORKER_URL = 'https://mafia-game.lionbabycrypto.workers.dev';

  try {
    const [tradesResp, stateResp, priceResp] = await Promise.all([
      fetch(`${WORKER_URL}/api/trades`).catch(() => null),
      fetch(`${WORKER_URL}/api/state`).catch(() => null),
      fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT').catch(() => null)
    ]);

    let trades = [];
    let state = { capital: 10000, position: 0, in_position: false };
    let btcPrice = 64358;

    if (tradesResp && tradesResp.ok) {
      const csvText = await tradesResp.text();
      trades = parseCSV(csvText);
    }

    if (stateResp && stateResp.ok) {
      state = await stateResp.json();
    }

    if (priceResp && priceResp.ok) {
      const priceData = await priceResp.json();
      btcPrice = parseFloat(priceData.price);
    }

    state.current_price = btcPrice;
    stateData = state;
    tradeData = trades;

    if (trades.length > 0 || state) {
      renderDashboard(state, trades);
    } else {
      // Fallback: fetch from GitHub raw directly
      await loadFromGithub();
    }
  } catch (e) {
    console.warn('Worker fetch failed, falling back to GitHub:', e);
    await loadFromGithub();
  }

  btn.disabled = false;
  btn.textContent = '⟳ Refresh Data';
}

async function loadFromGithub() {
  try {
    const [tradesResp, stateResp, priceResp] = await Promise.all([
      fetch(`https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/main/${TRADES_PATH}`).catch(() => null),
      fetch(`https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/main/${STATE_PATH}`).catch(() => null),
      fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT').catch(() => null)
    ]);

    let trades = [];
    let state = { capital: 10000, position: 0, in_position: false };
    let btcPrice = 64358;

    if (tradesResp && tradesResp.ok) {
      const csvText = await tradesResp.text();
      trades = parseCSV(csvText);
    }

    if (stateResp && stateResp.ok) {
      state = await stateResp.json();
    }

    if (priceResp && priceResp.ok) {
      const priceData = await priceResp.json();
      btcPrice = parseFloat(priceData.price);
    }

    state.current_price = btcPrice;
    stateData = state;
    tradeData = trades;

    if (trades.length > 0 || state) {
      renderDashboard(state, trades);
      document.getElementById('updateTs').textContent += ' (GitHub raw fallback)';
    } else {
      document.getElementById('content').innerHTML = `
        <div class="splash">
          <h2>No trading data yet</h2>
          <p>The paper trader will start logging trades when signals fire. Check back after a daily run.</p>
        </div>`;
    }
  } catch (e) {
    console.error('All data sources failed:', e);
    document.getElementById('content').innerHTML = `
      <div class="splash">
        <h2>Could not load data</h2>
        <p>Make sure trades and state are pushed to GitHub. The cron job runs daily at 9am SGT.</p>
        <p style="font-size:11px;color:#444;margin-top:10px">${e.message}</p>
      </div>`;
  }
}

// ─── Init ─────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
